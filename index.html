<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2yaka — Yakında</title>
    <meta
      name="description"
      content="Taksi durağında adil sıra yönetimi. Yakında."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #07070a;
        --bg2: #0c0c11;
        --card: #16161e;
        --gb: rgba(255, 255, 255, 0.065);
        --gb2: rgba(255, 255, 255, 0.11);
        --y: #ffc300;
        --ys: rgba(255, 195, 0, 0.1);
        --yb: rgba(255, 195, 0, 0.18);
        --yg: rgba(255, 195, 0, 0.26);
        --t: rgba(255, 255, 255, 0.93);
        --t2: rgba(255, 255, 255, 0.55);
        --t3: rgba(255, 255, 255, 0.3);
        --ease: cubic-bezier(0.16, 1, 0.3, 1);
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--t);
        min-height: 100vh;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
      }

      /* ---- BACKGROUND ---- */
      .bg-wrap {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }

      /* Orbs */
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
      }
      .orb-a {
        width: 780px;
        height: 680px;
        background: radial-gradient(
          circle,
          rgba(255, 195, 0, 0.11) 0%,
          transparent 65%
        );
        top: -200px;
        left: -220px;
        animation: oa 15s ease-in-out infinite;
      }
      .orb-b {
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(90, 60, 200, 0.09) 0%,
          transparent 65%
        );
        bottom: -180px;
        right: -80px;
        animation: ob 19s ease-in-out infinite;
      }
      .orb-c {
        width: 360px;
        height: 360px;
        background: radial-gradient(
          circle,
          rgba(255, 195, 0, 0.06) 0%,
          transparent 65%
        );
        top: 42%;
        right: 18%;
        animation: oc 12s ease-in-out infinite;
      }

      @keyframes oa {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        40% {
          transform: translate(60px, 50px) scale(1.08);
        }
        70% {
          transform: translate(-25px, -20px) scale(0.96);
        }
      }
      @keyframes ob {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(-50px, -38px) scale(1.1);
        }
      }
      @keyframes oc {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(26px, -32px) scale(1.14);
        }
      }

      /* Grid */
      .grid-overlay {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.016) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.016) 1px,
            transparent 1px
          );
        background-size: 56px 56px;
        mask-image: radial-gradient(
          ellipse 75% 65% at 50% 42%,
          rgba(0, 0, 0, 0.6) 0%,
          transparent 74%
        );
      }

      /* ---- LAYOUT ---- */
      .page {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 24px 60px;
        min-height: 100vh;
      }

      /* ---- HERO ---- */
      .hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        max-width: 680px;
        width: 100%;
      }

        .hero-brand {
          font-size: clamp(16px, 2vw, 20px);
          font-weight: 900;
          letter-spacing: -0.04em;
          color: var(--t3);
          margin-bottom: 20px;
        }
        .hero-brand span {
          color: var(--y);
        }

      /* Badge */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 15px;
        border-radius: 999px;
        background: var(--ys);
        border: 1px solid var(--yb);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--y);
        margin-bottom: 32px;
      }
      .bdot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--y);
        box-shadow: 0 0 8px var(--y);
        animation: bdot 2.4s ease-in-out infinite;
      }
      @keyframes bdot {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(0.7);
        }
      }

      /* Heading */
      .hero-heading {
        font-size: clamp(56px, 10vw, 100px);
        font-weight: 900;
        letter-spacing: -0.05em;
        line-height: 0.95;
        margin-bottom: 24px;
      }
      .hero-heading em {
        font-style: normal;
        color: var(--y);
      }

      .hero-sub {
        font-size: clamp(15px, 1.6vw, 17px);
        color: var(--t2);
        line-height: 1.7;
        max-width: 480px;
      }

      /* ---- FOOTER ---- */
      footer {
        position: relative;
        z-index: 1;
        padding: 24px;
        text-align: center;
      }
      .footer-text {
        font-size: 12px;
        color: var(--t3);
        letter-spacing: 0.02em;
      }
      .footer-text a {
        color: var(--t3);
        text-decoration: none;
        border-bottom: 1px solid transparent;
        transition:
          color 140ms,
          border-color 140ms;
      }
      .footer-text a:hover {
        color: var(--t2);
        border-color: var(--t3);
      }

      /* ---- RESPONSIVE ---- */
      @media (max-width: 480px) {
        .hero-heading {
          letter-spacing: -0.04em;
        }
      }
    </style>
  </head>
  <body>
    <!-- Background -->
    <div class="bg-wrap">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
      <div class="orb orb-c"></div>
      <div class="grid-overlay"></div>
    </div>

    <!-- Main -->
    <main class="page">
      <div class="hero">
        <p class="hero-brand"><span>2</span>yaka</p>

        <div class="badge">
          <span class="bdot"></span>
          Geliştiriliyor
        </div>

        <h1 class="hero-heading">Çok<br /><em>Yakında.</em></h1>

        <p class="hero-sub">
          Taksi durağında adil, şeffaf sıra yönetimi.<br />
          Şoförler için tasarlandı.
        </p>
      </div>
    </main>

    <!-- Footer -->
    <footer>
      <p class="footer-text">
        &copy; 2026 2yaka. Tüm hakları saklıdır. &nbsp;&middot;&nbsp;
        <a href="mailto:ekip@2yaka.net">ekip@2yaka.net</a>
      </p>
    </footer>
  </body>
</html>
